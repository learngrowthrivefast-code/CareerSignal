app = 'careersignal'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"

[mounts]
  source      = "careersignal_data"
  destination = "/data"

[http_service]
  internal_port        = 8501
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[[http_service.checks]]
  grace_period  = "15s"
  interval      = "30s"
  method        = "GET"
  timeout       = "10s"
  path          = "/_stcore/health"
